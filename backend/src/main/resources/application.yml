server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: helvino-ecommerce
  # DataSource is built programmatically in DataSourceConfig (uses PGSimpleDataSource
  # to bypass HikariCP's acceptsURL classloader issue in Spring Boot fat JARs)
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME:info@helvino.org}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  cache:
    type: simple

app:
  jwt:
    secret: ${JWT_SECRET:helvinoTechnologiesSecretKey2024VeryLongSecureRandomString}
    expiration: 86400000       # 24h
    refresh-expiration: 604800000  # 7d
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://ecommerce-theta-jade.vercel.app}
  company:
    name: "Helvino Technologies LTD"
    email: "info@helvino.org"
    phone: "0110421320"
    website: "https://helvino.org"

# M-Pesa Daraja API
mpesa:
  consumer-key: ${MPESA_CONSUMER_KEY:}
  consumer-secret: ${MPESA_CONSUMER_SECRET:}
  passkey: ${MPESA_PASSKEY:}
  shortcode: ${MPESA_SHORTCODE:174379}
  callback-url: ${MPESA_CALLBACK_URL:https://api.helvino.org/api/v1/payments/mpesa/callback}
  environment: ${MPESA_ENV:sandbox}

# Flutterwave
flutterwave:
  public-key: ${FLW_PUBLIC_KEY:}
  secret-key: ${FLW_SECRET_KEY:}
  encryption-key: ${FLW_ENCRYPTION_KEY:}
  webhook-secret: ${FLW_WEBHOOK_SECRET:}
  callback-url: ${FLW_CALLBACK_URL:https://shop.helvino.org/payment/verify}

# Africa's Talking (SMS)
africastalking:
  api-key: ${AT_API_KEY:}
  username: ${AT_USERNAME:sandbox}
  sender-id: ${AT_SENDER_ID:HELVINO}

# Cloudinary (image uploads)
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# Firebase (push notifications)
firebase:
  credentials-file: ${FIREBASE_CREDENTIALS_FILE:firebase-service-account.json}

logging:
  level:
    com.helvino: DEBUG
    org.springframework.security: INFO
